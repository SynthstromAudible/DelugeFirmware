repos:
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        types_or: [c, c++]
  - repo: local
    hooks:
      # Rust has two separate workspaces (crates/ and src/bsp/rust/); cargo fmt
      # is per-manifest, so each needs its own hook. --check only (no rewrite) to
      # match the other formatters' fail-and-report behaviour in this file.
      - id: cargo-fmt-crates
        name: rustfmt (crates)
        entry: cargo fmt --manifest-path crates/Cargo.toml --all --check --
        language: system
        types: [rust]
        files: ^crates/.*\.rs$
        pass_filenames: false
      - id: cargo-fmt-bsp
        name: rustfmt (bsp)
        entry: cargo fmt --manifest-path src/bsp/rust/Cargo.toml --check --
        language: system
        types: [rust]
        files: ^src/bsp/rust/.*\.rs$
        pass_filenames: false
      - id: libdeluge-boundary
        name: libdeluge platform boundary
        description: src/deluge must include <libdeluge/...>, not HAL headers directly
        entry: python3 scripts/check_platform_boundary.py
        language: system
        pass_filenames: false
        files: ^(src/deluge/|scripts/(check_platform_boundary\.py|platform_boundary_allowlist\.txt))
